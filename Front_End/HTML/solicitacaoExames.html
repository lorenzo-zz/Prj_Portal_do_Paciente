<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solicitação de Exames</title>
  <link rel="stylesheet" href="/Front_End/CSS/global.css" />
  <link rel="stylesheet" href="/Front_End/CSS/solicitacaoExames.css" />
  <link rel="shortcut icon" href="/Front_End/img/logoSemEscrita.png" type="image/x-icon">
</head>
<body>
 
  <!-- Header -->
  <header class="navbar">
    <nav>
      <a href="index.html">Portal Do Paciente</a>
    </nav>
    <div class="right_links"></div>
  </header>

 
  <div class="title-area">
    <div class="title-with-image">
      <img src="/Front_End/img/logoSemEscrita.png" alt="Ícone de Exames" class="titulo-img" />
      <h1>Solicitação de Exames</h1>
    </div>
    <p>Solicite seus exames médicos de forma rápida e segura</p>
  </div>
 
  <main class="exames-container">
    <form id="exames-form">
      <div class="form-group">
        <label for="nome-paciente">Nome Completo:</label>
        <input type="text" id="nome-paciente" name="nome-paciente" required />
      </div>
 
      <div class="form-group">
        <label for="cpf-paciente">CPF ou Prontuário:</label>
        <input type="text" id="cpf-paciente" name="cpf-paciente" required />
      </div>
 
      <div class="form-group">
        <label for="tipo-exame">Tipo de Exame:</label>
        <select id="tipo-exame" name="tipo-exame"></select>
      </div>
 
      <div class="form-group">
        <label for="convenio">Convênio / Plano de Saúde:</label>
        <input type="text" id="convenio" name="convenio" />
      </div>
 
      <div class="form-group">
        <label for="urgencia">Urgência da Solicitação:</label>
        <select id="urgencia" name="urgencia">
          <option value="urgente">Urgente</option>
          <option value="normal">Normal</option>
          <option value="eletivo">Eletivo</option>
        </select>
      </div>
 
      <div class="form-group">
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" required />
      </div>
 
      <div class="form-group">
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required />
      </div>
 
      <div class="form-group">
        <label for="data-solicitacao">Data de Solicitação:</label>
        <input type="date" id="data-solicitacao" name="data-solicitacao" required />
      </div>
 
      <div class="form-group">
        <label for="anexar-arquivo">Anexar Arquivo:</label>
        <input type="file" id="anexar-arquivo" name="anexar-arquivo" />
      </div>
 
      <div class="form-group">
        <label for="observacoes">Observações:</label>
        <textarea id="observacoes" name="observacoes" rows="4"></textarea>
      </div>
 
      <button type="submit" class="solicitar-btn">Solicitar Exame</button>
    </form>
  </main>
 
  <script src="/Front_End/JS/solicitacaoExames.js"></script>
</body>
</html>
