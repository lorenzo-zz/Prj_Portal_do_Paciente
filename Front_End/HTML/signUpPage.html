<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="/Front_End/img/LogoPortalApenasRedondoFundoBranco.png" type="image/x-icon">
  <link rel="stylesheet" href="../CSS/signUpPage.css" />
  <!--js secudanrio cpf e numero-->
  <script src="../JS/CadastroServices/cadastroPessoais/formatacaoCpfNumero.js"></script>
  <!-- JS principal json -->
  <script src="../JS/CadastroServices/cadastroPessoais/cadastroPessoais.js"></script>
  <title>Sign Up</title>
</head>

<body>
  <div class="form-container">
    <div class="form_autenticacao">
      <form id="cadastroForm">
        <a href="index.html"><img src="../img/logoLogin.png" alt=""></a>

        <h2>Dados Pessoais:</h2>

        <div class="erroCadastrar" style="display: none;">
          <p>Erro ao cadastrar as informações pessoais!</p>
        </div>

        <div class="caixa_input">
          <input type="text" name="nome" id="nome" required placeholder="Nome Completo" maxlength="100" />
        </div>

        <div class="caixa_input">
          <input type="text" name="cpf" id="cpf" required placeholder="CPF: (somente números)" maxlength="11"
            pattern="\d{11}" />
        </div>

        <div class="caixa_input">
          <input type="text" name="telefone" id="telefone" required placeholder="Telefone: (somente números)"
            maxlength="11" pattern="\d{10,11}" />
        </div>

        <div class="caixa_input">
          <input type="email" name="email" id="email" required placeholder="Email: exemplo@email.com" maxlength="100" />
        </div>

        <div class="radio_sexo">
          <label for="sexo">Sexo: </label>
          <input type="radio" name="sexo" id="sexo_m" value="M" required> Masculino
          <input type="radio" name="sexo" id="sexo_f" value="F"> Feminino
        </div>

        <div class="dt_nascimento">
          <label for="dt_nascimento">Data de Nascimento:</label>
          <input type="date" name="dt_nascimento" id="dt_nascimento" required>
        </div>

        <div class="input_doc">
          <input type="file" name="documento" id="documento" accept="image/*" required>
        </div>

        <div class="caixa_input">
          <input type="password" name="senha" id="senha" required placeholder="Senha" maxlength="30">
        </div>

        <div class="caixa_input">
          <input type="password" name="confirmar_senha" id="confirmar_senha" required placeholder="Confirmar Senha"
            maxlength="30">
        </div>

        <button type="submit">Registrar</button>
      </form>
    </div>


  </div>
</body>

</html>
