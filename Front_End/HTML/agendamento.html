<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agendamento de Consultas</title>
  <link rel="stylesheet" href="/Front_End/CSS/global.css" />
  <link rel="stylesheet" href="/Front_End/CSS/agendamento.css" />
  <link rel="shortcut icon" href="/Front_End/img/logoSemEscrita.png" type="image/x-icon">
</head>
<body>

  <!-- Header -->
  <header class="navbar">
    <nav>
      <a href="index.html">Portal Do Paciente</a>
    </nav>
    <div class="right_links"></div>
  </header>

  <!-- Título -->
  <div class="title-area">
    <div class="title-with-image">
      <img src="/Front_End/img/logoSemEscrita.png" alt="Ícone de Consulta" class="titulo-img" />
      <h1>Agendamento de Consultas</h1>
    </div>
    <p>Agende sua consulta com facilidade</p>
  </div>

  <!-- Formulário -->
  <main class="exames-container">
    <form id="consulta-form">
      <div class="form-group">
        <label for="nome-paciente">Nome Completo:</label>
        <input type="text" id="nome-paciente" name="nome-paciente" required placeholder="Insira seu nome completo" />
      </div>

      <div class="form-group">
        <label for="cpf-paciente">CPF:</label>
        <input type="number"  id="cpf-paciente" name="cpf-paciente" required placeholder="CPF: (ex: 123.456.789-99)" maxlength="11"/>
      </div>

      <div class="form-group">
        <label for="especialidade">Especialidade:</label>
       <select id="especialidade" name="especialidade" required>
  <option value="" selected disabled>Selecione uma especialidade</option>
</select>

      </div>

      <div class="form-group">
        <label for="data">Data da Consulta:</label>
        <input type="date" id="data" name="data" required />
      </div>

      <div class="form-group">
        <label for="horario">Horário:</label>
        <select id="horario" name="horario">
            <option value="" selected disabled>Selecione um horario</option>
        </select>
      </div>

      <div class="form-group">
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" placeholder="Telefone: (99) 12345-6789" required maxlength="11" />
      </div>

      <div class="form-group">
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required placeholder="Email: exemplo@email.com" maxlength="100" />
      </div>

      <button type="submit" class="solicitar-btn">Agendar Consulta</button>
    </form>
  </main>

  <!-- Modal de Confirmação -->
<div id="modal-alerta" class="modal-alerta hidden">
  <div class="modal-conteudo">
    <p>Consulta agendada com sucesso!</p>
    <button onclick="fecharModal()">OK</button>
  </div>
</div>

  <script src="/Front_End/JS/agendamento.js"></script>
</body>
</html>
