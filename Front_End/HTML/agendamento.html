<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendamento de Consultas - Portal do Paciente</title>
  <link rel="stylesheet" href="/Front_End/CSS/global.css" />
  <link rel="stylesheet" href="/Front_End/CSS/agendamento.css" />
  <link rel="shortcut icon" href="/Front_End/img/LogoPortalApenasRedondoFundoBranco.png" type="image/x-icon">
  <script src="../JS/Agendamento/agendamento.js" defer></script>

</head>

<body>


  <header class="navbar">
    <nav>
      <a href="index.html">Portal Do Paciente</a>
    </nav>
    <div class="right_links">
      <a href="/Front_End/HTML/index.html" id="logout_button">Sair</a>
    </div>
  </header>

  <div class="page_navigator">
    <a href="../HTML/index.html">Portal do Paciente</a>
    <p>/</p>
    <p>Agendamentos</p>
  </div>


  <div class="title-area">
    <div class="title-with-image">
      <img src="/Front_End/img/logoSemEscrita.png" alt="Ícone de Consulta" class="titulo-img" />
      <h1>Agendamento de Consultas</h1>
    </div>
    <p>Agende sua consulta com facilidade</p>
  </div>


  <main class="exames-container">
    <form id="consulta-form">
      <div class="form-group">
      </div>

      <div class="form-group">
        <label for="cpf-paciente">CPF:</label>
        <input type="text" id="cpf-paciente" name="cpf-paciente"  disabled
          maxlength="11" />
      </div>

      <div class="form-group">
        <label for="especialidade">Especialidade:</label>
        <select id="especialidade" name="especialidade" >
          <option value="" selected disabled>Selecione uma especialidade</option>
          <option value="CARDIOLOGIA">Cardiologia</option>
          <option value="PEDIATRIA">Pediatria</option>
          <option value="ORTOPEDIA">Ortopedia</option>
          <option value="NEUROLOGIA">Neurologia</option>
          <option value="GINECOLOGIA">Ginecologia</option>
          <option value="DERMATOLOGIA">Dermatologia</option>
          <option value="PSIQUIATRIA">Psiquiatria</option>
          <option value="ONCOLOGIA">Oncologia</option>
          <option value="UROLOGIA">Urologia</option>
          <option value="OFTALMOLOGIA">Oftalmologia</option>
          <option value="OTORRINOLARINGOLOGIA">Otorrinolaringologia</option>
          <option value="ANESTESIOLOGIA">Anestesiologia</option>
          <option value="GASTROENTEROLOGIA">Gastroenterologia</option>
          <option value="ENDOCRINOLOGIA">Endocrinologia</option>
          <option value="REUMATOLOGIA">Reumatologia</option>
          <option value="HEMATOLOGIA">Hematologia</option>
          <option value="PNEUMOLOGIA">Pneumologia</option>
          <option value="INFECTOLOGIA">Infectologia</option>
          <option value="RADIOLOGIA">Radiologia</option>
          <option value="CIRURGIA_GERAL">Cirurgia Geral</option>
          <option value="CIRURGIA_PLASTICA">Cirurgia Plástica</option>
          <option value="CIRURGIA_CARDIOVASCULAR">Cirurgia Cardiovascular</option>
          <option value="MEDICINA_ESPORTIVA">Medicina Esportiva</option>
          <option value="MEDICINA_NUCLEAR">Medicina Nuclear</option>
          <option value="MEDICINA_INTENSIVA">Medicina Intensiva</option>
          <option value="MEDICINA_PREVENTIVA">Medicina Preventiva</option>
          <option value="NUTROLOGIA">Nutrologia</option>
          <option value="ANGIOLOGIA">Angiologia</option>
          <option value="HEPATOLOGIA">Hepatologia</option>
          <option value="GENETICA_MEDICA">Genética Médica</option>
          <option value="CIRURGIA_PEDIATRICA">Cirurgia Pediátrica</option>
          <option value="CIRURGIA_ONCOLOGICA">Cirurgia Oncológica</option>
          <option value="CIRURGIA_TORACICA">Cirurgia Torácica</option>
          <option value="CIRURGIA_VASCULAR">Cirurgia Vascular</option>
          <option value="CIRURGIA_BUCOMAXILOFACIAL">Cirurgia Bucomaxilofacial</option>
          <option value="MEDICINA_DO_TRABALHO">Medicina do Trabalho</option>
          <option value="MEDICINA_FAMILIAR">Medicina Familiar</option>
          <option value="MEDICINA_LEGAL">Medicina Legal</option>
          <option value="MEDICINA_HIPERBARICA">Medicina Hiperbárica</option>
          <option value="MEDICINA_DO_SONO">Medicina do Sono</option>
          <option value="MEDICINA_PALIATIVA">Medicina Paliativa</option>
          <option value="ALERGOLOGIA">Alergologia</option>
          <option value="IMUNOLOGIA">Imunologia</option>
          <option value="SEXOLOGIA">Sexologia</option>
          <option value="TOXICOLOGIA">Toxicologia</option>
          <option value="MEDICINA_ESTETICA">Medicina Estética</option>
          <option value="FONOAUDIOLOGIA">Fonoaudiologia</option>
          <option value="ACUPUNTURA">Acupuntura</option>
          <option value="RADIOTERAPIA">Radioterapia</option>
          <option value="NEFROLOGIA">Nefrologia</option>
          <option value="PROCTOLOGIA">Proctologia</option>
          <option value="HANSENOLOGIA">Hanseníase</option>
          <option value="TERAPIA_INTENSIVA_PEDIATRICA">Terapia Intensiva Pediátrica</option>
          <option value="HEMODINAMICA">Hemodinâmica</option>
          <option value="TRANSPLANTOLOGIA">Transplantologia</option>
          <option value="TELEMEDICINA">Telemedicina</option>
          <option value="GERIATRIA">Geriatria</option>
          <option value="CLINICA_MEDICA">Clínica Médica</option>
          <option value="TRAUMATOLOGIA">Traumatologia</option>
          <option value="MASTOLOGIA">Mastologia</option>
          <option value="EPIDEMIOLOGIA">Epidemiologia</option>
          <option value="DOR_CRONICA">Dor Crônica</option>
          <option value="FARMACOLOGIA_CLINICA">Farmacologia Clínica</option>
          <option value="BIOINFORMATICA_MEDICA">Bioinformática Médica</option>
          <option value="MEDICINA_DE_URGENCIA">Medicina de Urgência</option>
          <option value="PSICOGERIATRIA">Psicogeriatria</option>
          <option value="PSICOTERAPIA">Psicoterapia</option>
          <option value="ULTRASSONOGRAFIA">Ultrassonografia</option>
          <option value="ENDOCRINOLOGIA_PEDIATRICA">Endocrinologia Pediátrica</option>
          <option value="PATOLOGIA_CLINICA">Patologia Clínica</option>
          <option value="MEDICINA_REGENERATIVA">Medicina Regenerativa</option>
          <option value="BIOETICA">Bioética</option>
          <option value="PSICOSSOMATICA">Psicossomática</option>
        </select>
      </div>


      </div>

      <div class="form-group">
        <label for="data">Data da Consulta:</label>
        <input type="date" name="date" min="1900-01-01" max="2100-12-31" id="data">

      </div>

      <div class="form-group">
        <label for="horario">Horário:</label>
        <select id="horario" name="horario" >
          <option value="" selected disabled>Selecione um horário</option>
          <option value="09:00">09:00</option>
          <option value="10:00">10:00</option>
          <option value="11:00">11:00</option>
          <option value="12:00">12:00</option>
          <option value="13:00">13:00</option>
          <option value="14:00">14:00</option>
          <option value="15:00">15:00</option>
          <option value="16:00">16:00</option>
          <option value="17:00">17:00</option>
          <option value="18:00">18:00</option>
        </select>
      </div>



      <div class="form-group">
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" placeholder="Telefone: (99) 12345-6789" 
          maxlength="11" />
      </div>

      <div class="form-group">
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required placeholder="Email: exemplo@email.com" maxlength="100" />
      </div>

      <button type="button" class="limpar-btn" onclick="limparFormulario()">Limpar Formulário</button>

      <button type="submit" class="solicitar-btn">Agendar Consulta</button>
    </form>
  </main>

  <div id="modal-alerta" class="modal-alerta hidden">
    <div class="modal-conteudo">
      <p>Consulta agendada com sucesso!</p>
      <button onclick="fecharModal()">OK</button>
    </div>
  </div>
  

  <footer class="footer">
    <p>&copy; 2025 Portal do Paciente. Todos os direitos reservados.</p>
    <a href="/Front_End/HTML/sobreNos.html">Sobre nós</a>
  </footer>
</body>

</html>
