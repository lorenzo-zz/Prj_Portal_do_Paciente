<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/Front_End/CSS/signUpPage.css" />
  <title>Login Page</title>
</head>

<body>
    <div class="form-container">
      <div class="formulario">
        <form>

          <a href="index.html"><img src="img/logoLogin.png" alt=""></a>

          <div class="caixa_input">
            <input type="text" name="nome" id="nome" required placeholder="Nome Completo" />
          </div>
          
          <div class="caixa_input"">
            <input type="number" name="cpf" id="cpf" required placeholder="CPF: (ex: 123.456.789-99)" />
          </div>

          <div class="caixa_input">
            <input type="tel" s name="telefone" id="telefone" required placeholder="Telefone: (99) 12345-6789">
          </div>

          <div class="caixa_input">
            <input type="email" name="email" id="email" required placeholder="Email: exemplo@email.com">
          </div>

          <div class="radio_sexo">
            <label for="sexo">Sexo: </label>
            <input type="radio" name="sexo" id="sexo" value="M" required> Masculino
            <input type="radio" name="sexo" id="sexo" value="F" required> Feminino
          </div>

          <div class="dt_nascimento">
            <label for="dt_nascimento">Data de Nascimento:</label>
            <input type="date" name="dt_nascimento" id="dt_nascimento" required>
          </div>
          <div class="caixa_input">
            <input type="password" name="senha" id="senha" required placeholder="Senha">
          </div>
          <div class="caixa_input">
            <input type="password" name="confirmar_senha" id="confirmar_senha" required placeholder="Confirmar Senha">
          </div>


          <button type="submit">Registrar</button>

        </form>
      </div>
</body>

</html>
