<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Front_End/CSS/homepage.css">
    <link rel="shortcut icon" href="/img/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="/Front_End/CSS/global.css">
    <title>Portal do Paciente</title>
</head>
<body>
    <header class="navbar"> 
        <nav>
        <a href="index.html">Portal Do Paciente</a>
        </nav>
        <div class="right_links">
            <a href="loginPage.html">Login</a>
            <a href="signUpPage.html" id="sign_button">Cadastrar</a>
        </div>
    </header>
    <div class="carousel">
        <div class="carousel-track">
            <div class="carousel-item" style="background-color: #3498db;"></div>
            <div class="carousel-item" style="background-color: #2ecc71;"></div>
            <div class="carousel-item" style="background-color: #e74c3c;"></div>
        </div>
        <div class="controls">
            <button onclick="moveSlide(-1)">‹</button>
            <button onclick="moveSlide(1)">›</button>
        </div>
        <div class="indicators">
            <span class="indicator" onclick="setSlide(0)"></span>
            <span class="indicator" onclick="setSlide(1)"></span>
            <span class="indicator" onclick="setSlide(2)"></span>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
